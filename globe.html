<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Climate Tipping Points — Globe</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f5f2ee;
  --ink: #1a1210;
  --ink-soft: #5a4a43;
  --header: #1a1210;
  --rule: #d9cfbd;
}
html,body { height:100vh; overflow:hidden; background:var(--bg); font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; color:var(--ink); display:flex; flex-direction:column; }

header {
  background:var(--ink); color:#f5ede0;
  padding:8px 20px;
  display:flex; align-items:baseline; gap:16px;
  flex-shrink:0;
}
header h1 { font-family:Georgia,serif; font-size:1.2rem; font-weight:400; letter-spacing:.03em; text-transform:uppercase; }
header p { font-size:.68rem; color:#a09080; }

.controls {
  background:#f8f4ee; border-bottom:1px solid var(--rule);
  padding:6px 18px; display:flex; align-items:center; gap:16px;
  flex-shrink:0; flex-wrap:wrap;
}
.ctrl-label { font-size:.65rem; font-weight:500; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); }
.filter-btn { font-family:inherit; font-size:.65rem; padding:2px 9px; border-radius:20px; border:1.5px solid var(--rule); background:transparent; cursor:pointer; color:var(--ink); transition:all .15s; }
.filter-btn.on { background:var(--ink); color:#f5ede0; border-color:var(--ink); }
.legend { display:flex; gap:12px; align-items:center; margin-left:auto; }
.leg { display:flex; align-items:center; gap:5px; font-size:.63rem; color:var(--ink-soft); }
.legline { width:18px; height:2.5px; }

.main { flex:1; display:flex; min-height:0; position:relative; }
#globe-wrap { flex:1; position:relative; }
#globeViz { width:100%; height:100%; }

/* Side panel */
.side {
  width:260px; border-left:1px solid var(--rule); background:#faf6ee;
  padding:12px 14px; overflow-y:auto; font-size:11px;
}
.side h2 { font-family:Georgia,serif; font-weight:400; font-size:15px; margin:0 0 4px; }
.side .kicker { font-size:.65rem; font-weight:500; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin-bottom:4px; display:flex; align-items:center; gap:5px; }
.side .kicker .dot { width:6px; height:6px; border-radius:50%; background:#ea4949; }
.outcome-row { display:flex; gap:6px; align-items:baseline; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid var(--rule); }
.outcome { font-family:Georgia,serif; font-style:italic; font-size:10px; color:var(--ink-soft); }
.threshold { font-family:Georgia,serif; font-size:13px; color:#ea4949; margin-left:auto; }
.desc { font-size:10px; line-height:1.55; color:#4a3a30; margin-bottom:10px; }
.side h3 { font-size:.65rem; font-weight:500; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin:4px 0 5px; }
.casc-list { list-style:none; padding:0; margin:0 0 8px; }
.casc-list li { display:grid; grid-template-columns:14px 1fr auto; gap:5px; align-items:flex-start; padding:4px 0; border-bottom:1px dotted var(--rule); font-size:10px; cursor:pointer; }
.casc-list li .arrow { font-size:10px; color:#ea4949; }
.casc-list li .arrow.stab { color:#4a7a3a; }
.casc-list li .arrow.unc { color:#888; }
.casc-list li .type-tag { font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--rule); border:1px solid var(--rule); margin-top:8px; }
.stats .cell { background:#faf6ee; padding:6px 8px; }
.stats .n { font-family:Georgia,serif; font-size:16px; line-height:1; color:#ea4949; }
.stats .l { font-size:.65rem; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin-top:2px; }
.close-btn { float:right; background:none; border:none; cursor:pointer; color:var(--ink-soft); font-size:.85rem; }
#closeSel { cursor:pointer; font-size:.65rem; color:var(--ink-soft); margin-left:auto; }

/* Temp bar */
.temp-bar { background:var(--bg); border-top:1px solid var(--rule); padding:10px 22px 14px; flex-shrink:0; }
.temp-label-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
.temp-bar-title { font-size:.67rem; font-weight:500; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); }
.temp-readout { font-family:Georgia,serif; font-size:2rem; color:#ea4949; line-height:1; transition:color .3s; }
.slider-track { position:relative; height:28px; }
.slider-track .bar { position:absolute; left:0; right:0; top:12px; height:3px; background:linear-gradient(to right,#f7c9b5 0%,#ea4949 30%,#c93448 50%,#7d1942 70%,#410f42 100%); border-radius:2px; }
.slider-track .ticks { position:absolute; left:0; right:0; top:18px; display:flex; justify-content:space-between; pointer-events:none; font-size:.62rem; color:var(--ink-soft); font-family:"Helvetica Neue",monospace; }
.slider-track .ticks span { position:relative; top:4px; transform:translateX(-50%); }
.slider-track input[type=range] { position:absolute; left:0; right:0; top:5px; width:100%; height:18px; -webkit-appearance:none; background:transparent; cursor:pointer; }
.slider-track input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:#fff; border:2px solid var(--ink); box-shadow:0 1px 4px rgba(0,0,0,.2); cursor:grab; }

/* HTML markers on globe */
.globe-marker {
  position:absolute; pointer-events:none;
  display:flex; flex-direction:column; align-items:center;
  transform:translate(-50%,-50%);
  transition:opacity .3s;
}
.globe-marker .disc {
  width:70px; height:70px; border-radius:50%;
  background:#ea4949; opacity:0;
  transition:opacity .6s cubic-bezier(0.34,1.4,0.64,1), background .4s;
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
}
.globe-marker.active .disc { opacity:0.85; }
.globe-marker .icon-img { width:60px; height:auto; position:relative; z-index:1; }
.globe-marker .node-name {
  font-size:10px; font-weight:600; text-align:center; margin-top:2px;
  color:var(--ink); position:relative; z-index:1; white-space:nowrap;
  transition:color .3s;
}
.globe-marker.active .node-name { color:#fff; }
.globe-marker .node-temp { font-family:Georgia,serif; font-size:9px; color:#ea4949; }
.globe-marker.active .node-temp { color:rgba(255,255,255,0.75); }
.globe-marker.dimmed { opacity:0.2; }
.globe-marker.selected .disc { outline:3px solid var(--ink); outline-offset:2px; }
</style>
</head>
<body>

<header>
  <h1>Climate Tipping Points</h1>
  <p>Nine Earth-system thresholds. Adjust warming to see cascades propagate.</p>
</header>

<div class="controls">
  <div style="display:flex;gap:5px;align-items:center;">
    <span class="ctrl-label">Region</span>
    <button class="filter-btn on" data-region="all">All</button>
    <button class="filter-btn" data-region="Arctic">Arctic</button>
    <button class="filter-btn" data-region="Tropics">Tropics</button>
    <button class="filter-btn" data-region="Antarctica">Antarctica</button>
    <button class="filter-btn" data-region="Atlantic">Atlantic</button>
  </div>
  <div style="display:flex;align-items:center;gap:6px;font-size:.63rem;color:var(--ink-soft);">
    <span style="font-size:.63rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);">Active</span>
    <span id="activeCount" style="font-family:Georgia,serif;font-size:1.1rem;color:#ea4949;">0</span>
    <span>of 9</span>
  </div>
  <div class="legend">
    <div class="leg"><div class="legline" style="background:#ea4949;"></div>Destabilizing</div>
    <div class="leg"><div class="legline" style="background:#4a7a3a;"></div>Stabilizing</div>
    <div class="leg"><div class="legline" style="background:#888;border-top:2px dashed #888;height:0;"></div>Unclear</div>
  </div>
</div>

<div class="main">
  <div id="globe-wrap">
    <div id="globeViz"></div>
    <div id="markers"></div>
  </div>
  <aside class="side" id="side"></aside>
</div>

<div class="temp-bar">
  <div class="temp-label-row">
    <span class="temp-bar-title">Global warming above pre-industrial</span>
    <span class="temp-readout" id="tempReadout">+1.0°C</span>
  </div>
  <div class="slider-track">
    <div class="bar"></div>
    <input id="tempSlider" type="range" min="0" max="100" step="1" value="0">
    <div class="ticks">
      <span>+1.0°</span><span>+1.5°</span><span>+2.0°</span><span>+2.5°</span><span>+3.0°</span><span>+3.5°</span><span>+4.0°</span><span>+4.5°</span><span>+5.0°</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.27.2/dist/globe.gl.min.js"></script>

function iconPath(name) { return ICON_URIS[name] || ''; }

const state = { temp:1.0, region:"all", selected:null };
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const node = id => NODES.find(n => n.id === id);
const isActive = n => state.temp >= n.threshold;
const isExtreme = () => state.temp >= 3.0;
const inRegion = n => state.region === "all" || n.region === state.region;
const connectedEdges = id => EDGES.filter(e => e.from===id || e.to===id);
const connectedIds = id => { const s=new Set([id]); EDGES.forEach(e=>{if(e.from===id)s.add(e.to);if(e.to===id)s.add(e.from);}); return s; };

function tempColor() {
  if (state.temp < 2.0) return '#ea4949';
  if (state.temp < 3.0) return '#c93448';
  if (state.temp < 4.0) return '#7d1942';
  return '#410f42';
}

// Build arc data for globe.gl
function buildArcs() {
  const activeIds = new Set(NODES.filter(isActive).map(n=>n.id));
  return EDGES.map((e,i) => {
    const a = node(e.from), b = node(e.to);
    const active = activeIds.has(a.id) && activeIds.has(b.id);
    const regionOk = inRegion(a) && inRegion(b);
    const selConns = state.selected ? connectedIds(state.selected) : null;
    const dimmed = state.selected ? (!selConns.has(a.id) || !selConns.has(b.id)) : false;
    const col = e.type==='stabilizing' ? '#4a7a3a' : e.type==='unclear' ? '#888888' : tempColor();
    return {
      id: i,
      startLat: a.lat, startLng: a.lng,
      endLat: b.lat, endLng: b.lng,
      color: col,
      active, regionOk, dimmed,
      type: e.type,
      note: e.note,
      opacity: (!active || !regionOk || dimmed) ? 0 : 0.85,
      stroke: e.type==='unclear' ? 1.5 : 3,
    };
  });
}

// Init Globe
const Globe = window.Globe;
let globe;

function initGlobe() {
  globe = Globe({ animateIn: false })
    .globeImageUrl('') // no texture — custom land color
    .backgroundColor('rgba(0,0,0,0)')
    .showAtmosphere(true)
    .atmosphereColor('#e8e0d4')
    .atmosphereAltitude(0.12)
    .polygonsData([]) // country polys loaded below
    .polygonCapColor(() => '#e8e3da')
    .polygonSideColor(() => '#d8d0c4')
    .polygonStrokeColor(() => '#c0b8ac')
    .polygonAltitude(0.002)
    .arcsData(buildArcs())
    .arcColor('color')
    .arcOpacity('opacity')
    .arcStroke('stroke')
    .arcDashLength(0.4)
    .arcDashGap(0.15)
    .arcDashAnimateTime(d => d.active ? 2000 : 0)
    .arcAltitude(0.15)
    .arcLabel(d => d.active ? d.note : '')
    .onArcClick(d => {
      // no-op
    })
    ($('#globeViz'));

  // Set initial camera
  globe.pointOfView({ lat:20, lng:0, altitude:2.2 }, 0);

  // Load country polygons
  fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson')
    .then(r => r.json())
    .then(data => {
      globe.polygonsData(data.features);
    })
    .catch(() => {
      // fallback: just show globe without country outlines
    });

  // Render HTML markers
  renderMarkers();

  // Animate markers on globe rotation
  globe.controls().autoRotate = false;
  globe.controls().enableZoom = true;

  // Update marker positions on each render frame
  globe.onZoom(() => updateMarkerPositions());
  setInterval(updateMarkerPositions, 50);
}

// HTML markers
const markerEls = {};

function renderMarkers() {
  const wrap = $('#markers');
  wrap.innerHTML = '';
  NODES.forEach(n => {
    const div = document.createElement('div');
    div.className = 'globe-marker';
    div.dataset.id = n.id;
    div.innerHTML = `
      <div class="disc"></div>
      <img class="icon-img" src="${iconPath(n.icon)}" alt="${n.short}">
      <div class="node-name">${n.short}</div>
      <div class="node-temp">+${n.threshold.toFixed(1)}°</div>
    `;
    div.addEventListener('click', () => selectNode(n.id));
    wrap.appendChild(div);
    markerEls[n.id] = div;
  });
  applyMarkerState();
}

function updateMarkerPositions() {
  if (!globe) return;
  const wrap = $('#markers');
  const wRect = wrap.getBoundingClientRect();
  NODES.forEach(n => {
    const el = markerEls[n.id];
    if (!el) return;
    const coords = globe.getScreenCoords(n.lat, n.lng, 0.02);
    if (!coords) { el.style.display='none'; return; }
    // Check if on visible side
    const camPos = globe.camera().position;
    const Three = window.THREE;
    const nodePos = new Three.Vector3();
    const phi = (90 - n.lat) * Math.PI/180;
    const theta = (n.lng + 180) * Math.PI/180;
    const R = globe.getGlobeRadius ? globe.getGlobeRadius() : 100;
    nodePos.set(
      -R * Math.sin(phi) * Math.cos(theta),
       R * Math.cos(phi),
       R * Math.sin(phi) * Math.sin(theta)
    );
    const dot = nodePos.dot(camPos);
    if (dot < 0) { el.style.display='none'; return; }
    el.style.display = 'flex';
    el.style.left = `${coords.x}px`;
    el.style.top  = `${coords.y}px`;
  });
}

function applyMarkerState() {
  const activeIds = new Set(NODES.filter(isActive).map(n=>n.id));
  const selConns = state.selected ? connectedIds(state.selected) : null;
  const col = tempColor();

  NODES.forEach(n => {
    const el = markerEls[n.id];
    if (!el) return;
    const active = activeIds.has(n.id);
    const regionOk = inRegion(n);
    const dimmed = (!regionOk) || (state.selected && !selConns.has(n.id));
    el.classList.toggle('active', active);
    el.classList.toggle('dimmed', dimmed && !state.selected ? false : !!dimmed);
    el.classList.toggle('selected', state.selected === n.id);
    if (active) el.querySelector('.disc').style.background = col;
  });

  $('#activeCount').textContent = activeIds.size;
  $('#activeCount').style.color = col;
  $('#tempReadout').style.color = col;

  // Update arcs
  if (globe) globe.arcsData(buildArcs());
}

function selectNode(id) {
  state.selected = state.selected === id ? null : id;
  NODES.forEach(n => markerEls[n.id]?.classList.toggle('selected', state.selected === n.id));
  applyMarkerState();
  renderSide();
}

function renderSide() {
  const side = $('#side');
  const extreme = isExtreme();
  if (!state.selected) {
    const ac = NODES.filter(isActive).length;
    side.innerHTML = `
      <div class="kicker"><span class="dot"></span>Cascade status</div>
      <h2 class="serif">${ac} of 9 elements at risk</h2>
      <div style="font-size:10px;color:var(--ink-soft);margin-bottom:8px;">At +${state.temp.toFixed(1)}°C above pre-industrial.</div>
      <div class="stats">
        <div class="cell"><div class="n">${NODES.filter(n=>isActive(n)&&n.tier==="hot").length}/${NODES.filter(n=>n.tier==="hot").length}</div><div class="l">Low threshold</div></div>
        <div class="cell"><div class="n">${NODES.filter(n=>isActive(n)&&n.tier==="deep").length}/${NODES.filter(n=>n.tier==="deep").length}</div><div class="l">High threshold</div></div>
        <div class="cell"><div class="n">${EDGES.filter(e=>isActive(node(e.from))&&isActive(node(e.to))).length}/${EDGES.length}</div><div class="l">Active cascades</div></div>
        <div class="cell"><div class="n">${9-ac}</div><div class="l">Below threshold</div></div>
      </div>
      <h3 style="margin-top:12px;">Elements</h3>
      <ul class="casc-list" style="margin-bottom:0;">
        ${NODES.slice().sort((a,b)=>a.threshold-b.threshold).map(n=>{
          const on=isActive(n);
          return `<li onclick="selectNode('${n.id}')">
            <span class="arrow" style="color:${on?tempColor():'var(--ink-soft)'};">●</span>
            <span>${n.name}</span>
            <span style="font-size:.65rem;color:var(--ink-soft);">${on?'Active':`+${n.threshold.toFixed(1)}°`}</span>
          </li>`;
        }).join('')}
      </ul>`;
    return;
  }
  const n = node(state.selected), on = isActive(n), es = connectedEdges(n.id);
  side.innerHTML = `
    <div class="kicker"><span class="dot" style="background:${on?tempColor():'var(--ink-soft)'};"></span>${n.region}
      <span id="closeSel" onclick="selectNode('${n.id}')">✕ Close</span>
    </div>
    <h2>${n.name}</h2>
    <div class="outcome-row">
      <div class="outcome">${n.outcome}</div>
      <div class="threshold">+${n.threshold.toFixed(1)}°</div>
    </div>
    <div class="desc">${n.desc}</div>
    <h3>Outgoing · ${es.filter(e=>e.from===n.id).length}</h3>
    <ul class="casc-list">
      ${es.filter(e=>e.from===n.id).map(e=>{
        const t=node(e.to),cls=e.type==='destabilizing'?'':'stab'||e.type==='unclear'?'unc':'';
        return `<li onclick="selectNode('${t.id}')"><span class="arrow ${cls}">→</span><span>${t.name}<br><span style="color:var(--ink-soft);font-size:9px;font-style:italic;">${e.note}</span></span><span class="type-tag">${e.type}</span></li>`;
      }).join('')}
    </ul>
    <h3>Incoming · ${es.filter(e=>e.to===n.id).length}</h3>
    <ul class="casc-list" style="margin-bottom:0;">
      ${es.filter(e=>e.to===n.id).map(e=>{
        const s=node(e.from),cls=e.type==='destabilizing'?'':e.type==='stabilizing'?'stab':'unc';
        return `<li onclick="selectNode('${s.id}')"><span class="arrow ${cls}">←</span><span>${s.name}<br><span style="color:var(--ink-soft);font-size:9px;font-style:italic;">${e.note}</span></span><span class="type-tag">${e.type}</span></li>`;
      }).join('')}
    </ul>`;
}

// Slider
$('#tempSlider').addEventListener('input', function() {
  const raw = parseInt(this.value) / 100;
  const t = Math.pow(raw, 1.4);
  state.temp = Math.round((1.0 + t * 4.0) * 10) / 10;
  $('#tempReadout').textContent = `+${state.temp.toFixed(1)}°C`;
  $('#tempReadout').style.color = tempColor();
  applyMarkerState();
  if (!state.selected) renderSide();
});

// Region filters
$$('.filter-btn').forEach(b => b.addEventListener('click', () => {
  $$('.filter-btn').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  state.region = b.dataset.region;
  applyMarkerState();
}));

// Init
window.addEventListener('load', () => {
  initGlobe();
  renderSide();
});
</script>
</body>
</html>
