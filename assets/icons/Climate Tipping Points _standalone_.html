active { background: var(--inactive); }\n  .side h2 { font-family: Georgia, serif; font-weight: 400; font-size: 16px; margin: 0 0 2px; line-height: 1.1; }\n  .side .outcome-row { display: flex; gap: 6px; align-items: baseline; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--rule); }\n  .side .outcome { font-family: Georgia, serif; font-style: italic; font-size: 10.5px; color: var(--ink-soft); }\n  .side .threshold { font-family: Georgia, serif; font-size: 13px; color: var(--hot); margin-left: auto; }\n  .side .threshold.deep { color: var(--deep); }\n  .side .desc { font-size: 10.5px; color: var(--ink); line-height: 1.5; margin-bottom: 10px; }\n  .side .desc-stat { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); margin-bottom: 10px; }\n  .side .desc-stat .k { font-family: ui-monospace, monospace; font-size: 7.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 2px; }\n  .side .desc-stat .v { font-family: Georgia, serif; font-size: 11px; }\n  .side h3 { font-family: ui-monospace, monospace; font-size: 8.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); font-weight: 500; margin: 3px 0 5px; }\n  .casc-list { list-style: none; padding: 0; margin: 0 0 10px; }\n  .casc-list li { display: grid; grid-template-columns: 14px 1fr auto; gap: 6px; align-items: center; padding: 5px 0; border-bottom: 1px dotted var(--rule); font-size: 10.5px; cursor: pointer; }\n  .casc-list li:hover { padding-left: 2px; }\n  .casc-list li .arrow { font-family: ui-monospace, monospace; font-size: 11px; color: var(--edge-red); }\n  .casc-list li .arrow.stab { color: var(--edge-green); }\n  .casc-list li .arrow.unc { color: var(--edge-grey); }\n  .casc-list li .target { font-family: Georgia, serif; }\n  .casc-list li .type-tag { font-family: ui-monospace, monospace; font-size: 7.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); }\n  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-top: 10px; }\n  .stats .cell { background: #faf6ee; padding: 7px 8px; }\n  .stats .n { font-family: Georgia, serif; font-size: 17px; line-height: 1; }\n  .stats .n.hot { color: var(--hot); } .stats .n.deep { color: var(--purple); }\n  .stats .l { font-family: ui-monospace, monospace; font-size: 7.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); margin-top: 3px; }\n  .status-chip { display: inline-block; font-family: ui-monospace, monospace; font-size: 7.5px; letter-spacing: .1em; text-transform: uppercase; padding: 2px 5px; border-radius: 2px; background: var(--bg-2); color: var(--ink-soft); }\n  .status-chip.on-hot { background: var(--hot); color: #fff; }\n  .status-chip.on-deep { background: var(--purple); color: #fff; }\n  .map-shell.edit-mode { outline: 2px dashed var(--hot); outline-offset: -2px; }\n  .map-shell.edit-mode .node-g { cursor: move; }\n  .map-shell.edit-mode .node-g .activation-disc { stroke: var(--hot); stroke-width: 1.5; stroke-dasharray: 4 4; fill: rgba(224,48,32,0.08); opacity: 0.9; }\n  .map-shell.dragging { cursor: grabbing; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<header class=\"app\">\n  <div>\n    <h1 style=\"display:inline-block;vertical-align:middle;\">Climate Tipping Points<\u002Fh1>\n    <span class=\"sub\">Nine Earth-system thresholds. Adjust warming to see cascades propagate.<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"meta\">\n    FIG. 01 · CASCADE MAP &nbsp; <span>McKay 2022 · Wunderling 2024<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"controls\">\n  <div class=\"temp-wrap\">\n    <div class=\"lab\">\n      <span>Global warming above pre-industrial<\u002Fspan>\n      <span class=\"v\" id=\"tempReadout\">+1.5°C<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"slider-track\">\n      <div class=\"bar\"><\u002Fdiv>\n      <input id=\"tempSlider\" type=\"range\" min=\"1.0\" max=\"5.0\" step=\"0.1\" value=\"1.5\">\n      <div class=\"ticks\">\n        <span>+1.0°<\u002Fspan><span>+1.5°<\u002Fspan><span>+2.0°<\u002Fspan><span>+2.5°<\u002Fspan><span>+3.0°<\u002Fspan><span>+3.5°<\u002Fspan><span>+4.0°<\u002Fspan><span>+4.5°<\u002Fspan><span>+5.0°<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"region-filter\" id=\"regionFilter\">\n    <button data-region=\"all\" class=\"on\">All<\u002Fbutton>\n    <button data-region=\"Arctic\">Arctic<\u002Fbutton>\n    <button data-region=\"Tropics\">Tropics<\u002Fbutton>\n    <button data-region=\"Antarctica\">Antarctica<\u002Fbutton>\n    <button data-region=\"Atlantic\">Atlantic<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"legend\">\n    <div class=\"item\"><span class=\"swatch red\"><\u002Fspan>Destab.<\u002Fdiv>\n    <div class=\"item\"><span class=\"swatch purple\"><\u002Fspan>Extreme<\u002Fdiv>\n    <div class=\"item\"><span class=\"swatch green\"><\u002Fspan>Stab.<\u002Fdiv>\n    <div class=\"item\"><span class=\"swatch grey\"><\u002Fspan>Unclear<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"app-grid\">\n  <div class=\"map-wrap\">\n    <div class=\"map-shell\" id=\"mapShell\">\n      <div class=\"caption\">\n        <span class=\"num\" id=\"activeCount\">0<\u002Fspan>&nbsp;of 9 active\n        <span class=\"sep\">·<\u002Fspan>\n        <span id=\"warmingLabel\">+1.5°C warming<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"zoom-ctrl\">\n        <button id=\"zoomIn\" title=\"Zoom in\">+<\u002Fbutton>\n        <div class=\"zoom-level\" id=\"zoomLevel\">100%<\u002Fdiv>\n        <button id=\"zoomReset\" title=\"Reset to 100%\" style=\"font-size:10px;font-family:ui-monospace,monospace;\">⊙<\u002Fbutton>\n        <button id=\"pickMode\" title=\"Edit node positions (drag nodes)\" style=\"font-size:11px;\">✎<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"pickPanel\" style=\"position:absolute;bottom:10px;left:14px;z-index:5;display:none;background:#1a1210;color:#f5ede0;padding:10px 12px;border-radius:2px;font-family:ui-monospace,monospace;font-size:10px;max-width:460px;line-height:1.5;max-height:calc(100vh - 200px);overflow-y:auto;\">\n        <div style=\"color:#c6b8a4;font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;\">Edit mode — drag any node to reposition it<\u002Fdiv>\n        <div id=\"pickNodeList\" style=\"display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;\"><\u002Fdiv>\n        <div style=\"border-top:1px solid #3a2a24;padding-top:8px;margin-top:4px;\">\n          <button id=\"pickCopy\" style=\"background:#e07a5f;color:#1a1210;border:none;padding:4px 10px;font-family:inherit;font-size:10px;cursor:pointer;border-radius:2px;\">Copy all coords<\u002Fbutton>\n          <button id=\"pickExit\" style=\"margin-left:4px;background:transparent;color:#c6b8a4;border:1px solid #3a2a24;padding:4px 10px;font-family:inherit;font-size:10px;cursor:pointer;border-radius:2px;\">Exit<\u002Fbutton>\n          <pre id=\"pickAll\" style=\"margin:8px 0 0;color:#d4c3aa;font-size:10px;white-space:pre-wrap;\"><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <svg class=\"map\" id=\"mapSvg\" viewBox=\"0 0 1740 871\" xmlns=\"http://www.w3.org/2000/svg\" preserveAspectRatio=\"xMidYMid meet\">\n        <defs id=\"mapDefs\"><\u002Fdefs>\n        <g id=\"viewport\">\n          <g class=\"world\" id=\"world\"><\u002Fg>\n          <g id=\"edges\"><\u002Fg>\n          <g id=\"nodes\"><\u002Fg>\n        <\u002Fg>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <aside class=\"side\" id=\"side\"><\u002Faside>\n<\u002Fdiv>\n\n<script>\n/* ---------- DATA ---------- */\nconst NODES = [\n  { id: \"gris\",  name: \"Greenland Ice Sheet\",         short: \"Greenland\",   threshold: 1.5, outcome: \"Collapse\",      region: \"Arctic\",     x: 0,    y: 0,   tier: \"hot\",  icon: \"greenland\",\n    desc: \"Multi-meter sea-level rise locked in over millennia once crossed. Meltwater freshens the N. Atlantic.\" },\n  { id: \"perm\",  name: \"Boreal Permafrost\",           short: \"Permafrost\",  threshold: 1.5, outcome: \"Abrupt Thaw\",   region: \"Arctic\",     x: 0,    y: 0,   tier: \"hot\",  icon: \"boreal\",\n    desc: \"Sudden collapse of carbon-rich frozen soils releases CO₂ and methane — a strong positive feedback.\" },\n  { id: \"amoc\",  name: \"AMOC\",                        short: \"AMOC\",        threshold: 4.0, outcome: \"Collapse\",      region: \"Atlantic\",   x: 0,    y: 0,   tier: \"deep\", icon: \"amoc\",\n    desc: \"Shutdown of the Gulf Stream cools the N. Atlantic, shifts rain belts, and destabilizes monsoons and the Amazon.\" },\n  { id: \"mtg\",   name: \"Mountain Glaciers\",           short: \"Glaciers\",    threshold: 2.0, outcome: \"Loss\",          region: \"Arctic\",     x: 0,    y: 0,   tier: \"hot\",  icon: \"glaciers\",\n    desc: \"Near-total loss of non-polar glaciers. Seasonal meltwater for ~2 billion people declines, then collapses.\" },\n  { id: \"mons\",  name: \"W. African & Indian Monsoons\", short: \"Monsoons\",   threshold: 3.0, outcome: \"Precip. Shift\", region: \"Tropics\",    x: 0,    y: 0,   tier: \"deep\", icon: \"monsoon\",\n    desc: \"Large-scale reorganization of tropical rainfall: potential Sahel greening offset by disrupted Asian wet seasons.\" },\n  { id: \"amaz\",  name: \"Amazon Rainforest\",           short: \"Amazon\",      threshold: 3.0, outcome: \"Dieback\",       region: \"Tropics\",    x: 0,    y: 0,   tier: \"deep\", icon: \"amazon\",\n    desc: \"Drought, fire, and deforestation push the forest toward savanna. Loss of moisture recycling amplifies drying.\" },\n  { id: \"coral\", name: \"Low-Latitude Coral Reefs\",    short: \"Coral\",       threshold: 1.5, outcome: \"Die-Off\",       region: \"Tropics\",    x: 0,    y: 0,   tier: \"hot\",  icon: \"coral\",\n    desc: \"Mass bleaching becomes annual. Warm-water reef ecosystems collapse with cascading fisheries and coastal effects.\" },\n  { id: \"eais\",  name: \"East Antarctic Basins\",       short: \"E. Antarctic\",threshold: 3.0, outcome: \"Collapse\",      region: \"Antarctica\", x: 0,    y: 0,   tier: \"deep\", icon: \"east-antarctic\",\n    desc: \"Marine-grounded basins in E. Antarctica would commit many meters of sea-level rise over centuries.\" },\n  { id: \"wais\",  name: \"West Antarctic Ice Sheet\",    short: \"W. Antarctic\",threshold: 1.5, outcome: \"Collapse\",      region: \"Antarctica\", x: 0,    y: 0,   tier: \"hot\",  icon: \"west-antarctic\",\n    desc: \"Marine ice-cliff instability could drive rapid retreat, committing ~3.3 m of sea-level rise.\" }\n];\n\nconst EDGES = [\n  { from: \"gris\", to: \"amoc\", type: \"destabilizing\", note: \"Meltwater freshens N. Atlantic\" },\n  { from: \"perm\", to: \"gris\", type: \"destabilizing\", note: \"CO₂/CH₄ amplifies warming\" },\n  { from: \"perm\", to: \"amaz\", type: \"destabilizing\", note: \"Amplified warming\" },\n  { from: \"amoc\", to: \"amaz\", type: \"destabilizing\", note: \"ITCZ shift dries Amazon\" },\n  { from: \"amoc\", to: \"mons\", type: \"destabilizing\", note: \"Weakens monsoons\" },\n  { from: \"wais\", to: \"eais\", type: \"destabilizing\", note: \"Shared basin dynamics\" },\n  { from: \"mtg\",  to: \"mons\", type: \"destabilizing\", note: \"Altered Asian hydrology\" },\n  { from: \"amaz\", to: \"mons\", type: \"destabilizing\", note: \"Lost moisture recycling\" },\n  { from: \"coral\",to: \"mons\", type: \"destabilizing\", note: \"SST feedback on rainfall\" },\n  { from: \"amoc\", to: \"gris\", type: \"stabilizing\",   note: \"Cooler N. Atlantic slows melt\" },\n  { from: \"amoc\", to: \"perm\", type: \"stabilizing\",   note: \"Cooler N. hemisphere limits thaw\" },\n  { from: \"gris\", to: \"wais\", type: \"unclear\",       note: \"Teleconnection debated\" },\n  { from: \"eais\", to: \"amoc\", type: \"unclear\",       note: \"SH freshwater pathway uncertain\" },\n  { from: \"mons\", to: \"amaz\", type: \"unclear\",       note: \"Feedback sign under debate\" }\n];\n\nconst state = { temp: 1.5, region: \"all\", selected: null, zoom: 1, panX: 0, panY: 0 };\nconst $  = (s, r=document) => r.querySelector(s);\nconst $$ = (s, r=document) => Array.from(r.querySelectorAll(s));\nconst node = (id) => NODES.find(n => n.id === id);\nconst isActive = (n) => state.temp >= n.threshold;\nconst isExtreme = () => state.temp >= 3.0;\nconst inRegion = (n) => state.region === \"all\" || n.region === state.region;\nconst connectedEdges = (id) => EDGES.filter(e => e.from === id || e.to === id);\nconst connectedIds = (id) => { const s = new Set([id]); EDGES.forEach(e => { if (e.from===id) s.add(e.to); if (e.to===id) s.add(e.from); }); return s; };\n\n/* ---------- LOAD ASSETS ---------- */\nasync function loadMap() {\n  const res = await fetch('assets/world-map.svg');\n  const txt = await res.text();\n  const m = txt.match(/<svg[^>]*>([\\s\\S]*?)<\\/svg>/);\n  if (m) {\n    const inner = m[1].replace(/<defs>[\\s\\S]*?<\\/defs>/, '');\n    $('#world').innerHTML = inner;\n  }\n}\n\n// Load an icon and return its inner body + any defs, with clipPath IDs namespaced\nasync function loadIcon(name, ns) {\n  try {\n    const res = await fetch(`assets/icons/${name}.svg`);\n    if (!res.ok) return null;\n    const txt = await res.text();\n    let inner = (txt.match(/<svg[^>]*>([\\s\\S]*?)<\\/svg>/) || [,''])[1];\n    let defs = (txt.match(/<defs>([\\s\\S]*?)<\\/defs>/) || [,''])[1] || '';\n    inner = inner.replace(/<defs>[\\s\\S]*?<\\/defs>/, '');\n    // Namespace clipPath IDs to avoid collisions when multiple icons are inlined together\n    const clipIds = [...defs.matchAll(/id=\"(clippath[-\\w]*)\"/g)].map(m => m[1]);\n    for (const id of clipIds) {\n      const newId = `${ns}__${id}`;\n      defs = defs.replaceAll(`id=\"${id}\"`, `id=\"${newId}\"`);\n      inner = inner.replaceAll(`url(#${id})`, `url(#${newId})`);\n    }\n    return { inner, defs, clipIds: clipIds.map(id => `${ns}__${id}`) };\n  } catch (e) { return null; }\n}\n\n/* ---------- RENDER ---------- */\nfunction curvePath(a, b, bend) {\n  const dx = b.x - a.x, dy = b.y - a.y;\n  const len = Math.hypot(dx, dy) || 1;\n  const nx = -dy/len, ny = dx/len;\n  const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;\n  return `M ${a.x} ${a.y} Q ${mx + nx*len*bend} ${my + ny*len*bend} ${b.x} ${b.y}`;\n}\nfunction edgeBend(e) {\n  const seed = (e.from+e.to).split(\"\").reduce((s,c)=>s+c.charCodeAt(0),0);\n  return [0.14,-0.18,0.22,-0.12,0.28,-0.24][seed % 6];\n}\nfunction renderEdges() {\n  $('#edges').innerHTML = EDGES.map((e,i)=>{\n    const a = node(e.from), b = node(e.to);\n    return `<path class=\"edge ${e.type}\" data-idx=\"${i}\" d=\"${curvePath(a,b,edgeBend(e))}\" />`;\n  }).join('');\n}\n\n// Inline both base and effect icons, stacked — visibility toggled via active class\nasync function renderNodes() {\n  const iconCache = {};\n  for (const n of NODES) {\n    const base = await loadIcon(n.icon, `${n.id}_base`);\n    const eff  = await loadIcon(`${n.icon}-effect`, `${n.id}_eff`);\n    iconCache[n.id] = { base, eff: eff || base };\n  }\n  __iconCache = iconCache;\n  // Append all collected defs to #mapDefs (namespaced so no collisions)\n  const allDefs = Object.values(iconCache).flatMap(({base, eff}) => [base?.defs, eff?.defs].filter(Boolean)).join('\\n');\n  $('#mapDefs').innerHTML += allDefs;\n\n  const iconW = 160, iconH = 160 * (80/120); // ~107\n  const scale = iconW / 120;\n\n  $('#nodes').innerHTML = NODES.map(n => {\n    const { base, eff } = iconCache[n.id];\n    const discR = 95;\n    const baseTx = `translate(${n.x - iconW/2}, ${n.y - iconH/2}) scale(${scale})`;\n    return `\n      <g class=\"node-g\" data-id=\"${n.id}\" data-tier=\"${n.tier}\">\n        <circle class=\"activation-disc\" cx=\"${n.x}\" cy=\"${n.y}\" r=\"${discR}\" />\n        <g class=\"node-icon icon-base\" transform=\"${baseTx}\">${base?.inner || ''}<\u002Fg>\n        <g class=\"node-icon icon-effect\" transform=\"${baseTx}\" style=\"display:none;\">${eff?.inner || ''}<\u002Fg>\n        <text class=\"node-label\" x=\"${n.x}\" y=\"${n.y + iconH/2 + 22}\">${n.short}<\u002Ftext>\n        <text class=\"node-temp\" x=\"${n.x}\" y=\"${n.y + iconH/2 + 42}\">+${n.threshold.toFixed(1)}°<\u002Ftext>\n      <\u002Fg>`;\n  }).join('');\n\n  $$('.node-g').forEach(el => {\n    el.addEventListener('mousedown', (ev) => {\n      if (editMode) startNodeDrag(ev, el.dataset.id);\n    });\n    el.addEventListener('click', (ev) => {\n      if (editMode) return; // no selection while editing\n      ev.stopPropagation();\n      state.selected = state.selected === el.dataset.id ? null : el.dataset.id;\n      applyState(); renderSide();\n    });\n  });\n}\n\n/* ---------- STATE ---------- */\nfunction applyState() {\n  const extreme = isExtreme();\n  const activeNodes = new Set(NODES.filter(n => isActive(n) && inRegion(n)).map(n=>n.id));\n  const selConns = state.selected ? connectedIds(state.selected) : null;\n\n  $$('.node-g').forEach(el=>{\n    const id = el.dataset.id, n = node(id);\n    const active = isActive(n) && inRegion(n);\n    el.classList.toggle('active', active);\n    el.classList.toggle('extreme', active && extreme);\n    el.classList.toggle('hot', n.tier === 'hot');\n    el.classList.toggle('deep', n.tier === 'deep');\n    el.classList.toggle('selected', state.selected === id);\n    const dim = (!inRegion(n)) || (state.selected && !selConns.has(id));\n    el.classList.toggle('dim-node', !!dim);\n\n    // Swap icon: show effect icon when active\n    const base = el.querySelector('.icon-base');\n    const eff  = el.querySelector('.icon-effect');\n    if (base && eff) {\n      base.style.display = active ? 'none' : '';\n      eff.style.display  = active ? '' : 'none';\n    }\n  });\n\n  $$('.edge').forEach(el=>{\n    const e = EDGES[+el.dataset.idx];\n    const a = node(e.from), b = node(e.to);\n    const both = activeNodes.has(a.id) && activeNodes.has(b.id);\n    el.classList.toggle('active', both);\n    el.classList.toggle('extreme', both && extreme && e.type === 'destabilizing');\n    let dim = false;\n    if (state.selected && !(e.from===state.selected || e.to===state.selected)) dim = true;\n    if (state.region!=='all' && (!inRegion(a) || !inRegion(b))) dim = true;\n    el.classList.toggle('dim', dim);\n  });\n\n  $('#activeCount').textContent = activeNodes.size;\n  $('#activeCount').classList.toggle('deep', extreme);\n  $('#warmingLabel').textContent = `+${state.temp.toFixed(1)}°C warming`;\n  const ro = $('#tempReadout');\n  ro.textContent = `+${state.temp.toFixed(1)}°C`;\n  ro.classList.toggle('warn', extreme);\n}\n\n/* ---------- SIDE PANEL ---------- */\nfunction renderSide() {\n  const side = $('#side');\n  const extreme = isExtreme();\n  if (!state.selected) {\n    const activeCount = NODES.filter(isActive).length;\n    side.innerHTML = `\n      <div class=\"kicker\"><span class=\"dot ${extreme?'deep':''}\"><\u002Fspan>Cascade status<\u002Fdiv>\n      <h2 class=\"serif\">${activeCount} of 9 elements at risk<\u002Fh2>\n      <div class=\"outcome\" style=\"margin-top:4px;\">At <b>+${state.temp.toFixed(1)}°C<\u002Fb> above pre-industrial.<\u002Fdiv>\n      <div class=\"stats\">\n        <div class=\"cell\"><div class=\"n hot\">${NODES.filter(n=>n.tier===\"hot\"&&isActive(n)).length}<span style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--ink-soft);\">/${NODES.filter(n=>n.tier===\"hot\").length}<\u002Fspan><\u002Fdiv><div class=\"l\">Low threshold<\u002Fdiv><\u002Fdiv>\n        <div class=\"cell\"><div class=\"n deep\">${NODES.filter(n=>n.tier===\"deep\"&&isActive(n)).length}<span style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--ink-soft);\">/${NODES.filter(n=>n.tier===\"deep\").length}<\u002Fspan><\u002Fdiv><div class=\"l\">High threshold<\u002Fdiv><\u002Fdiv>\n        <div class=\"cell\"><div class=\"n\">${EDGES.filter(e=>isActive(node(e.from))&&isActive(node(e.to))).length}<span style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--ink-soft);\">/${EDGES.length}<\u002Fspan><\u002Fdiv><div class=\"l\">Active cascades<\u002Fdiv><\u002Fdiv>\n        <div class=\"cell\"><div class=\"n\">${9-activeCount}<\u002Fdiv><div class=\"l\">Below threshold<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <h3 style=\"margin-top:14px;\">Elements<\u002Fh3>\n      <ul class=\"casc-list\" style=\"margin-bottom:0;\">\n        ${NODES.slice().sort((a,b)=>a.threshold-b.threshold||a.name.localeCompare(b.name)).map(n=>{\n          const on = isActive(n), chip = on ? (extreme&&n.tier===\"deep\"?\"on-deep\":\"on-hot\") : \"\";\n          return `<li data-jump=\"${n.id}\">\n            <span class=\"arrow\" style=\"color:${on?(extreme&&n.tier===\"deep\"?\"var(--purple)\":\"var(--hot)\"):\"var(--inactive)\"};\">●<\u002Fspan>\n            <span class=\"target\">${n.name}<\u002Fspan>\n            <span class=\"status-chip ${chip}\">${on?\"Active\":`+${n.threshold.toFixed(1)}°`}<\u002Fspan>\n          <\u002Fli>`;\n        }).join('')}\n      <\u002Ful>`;\n    $$('#side li[data-jump]').forEach(li => li.addEventListener('click', () => { state.selected = li.dataset.jump; applyState(); renderSide(); }));\n    return;\n  }\n  const n = node(state.selected), on = isActive(n), es = connectedEdges(n.id);\n  const extremeNode = on && extreme && n.tier === \"deep\";\n  side.innerHTML = `\n    <div class=\"kicker\"><span class=\"dot ${extremeNode?\"deep\":\"\"} ${on?\"\":\"inactive\"}\"><\u002Fspan>${n.region}\n      <span style=\"margin-left:auto;cursor:pointer;color:var(--ink);font-family:ui-monospace,monospace;font-size:9px;\" id=\"closeSel\">✕ Close<\u002Fspan>\n    <\u002Fdiv>\n    <h2 class=\"serif\">${n.name}<\u002Fh2>\n    <div class=\"outcome-row\">\n      <div class=\"outcome\">${n.outcome}<\u002Fdiv>\n      <div class=\"threshold ${extremeNode?\"deep\":\"\"}\">+${n.threshold.toFixed(1)}°<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"desc\">${n.desc}<\u002Fdiv>\n    <div class=\"desc-stat\">\n      <div><div class=\"k\">Status<\u002Fdiv><div class=\"v\" style=\"color:${on?(extremeNode?\"var(--purple)\":\"var(--hot)\"):\"var(--ink-soft)\"};\">${on?\"Crossed\":`−${(n.threshold-state.temp).toFixed(1)}°`}<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">Region<\u002Fdiv><div class=\"v\">${n.region}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h3>Outgoing · ${es.filter(e=>e.from===n.id).length}<\u002Fh3>\n    <ul class=\"casc-list\">\n      ${es.filter(e=>e.from===n.id).length===0?`<li style=\"color:var(--ink-soft);grid-template-columns:1fr;\">None.<\u002Fli>`:\n        es.filter(e=>e.from===n.id).map(e=>{const t=node(e.to),a=e.type===\"destabilizing\"?\"→\":e.type===\"stabilizing\"?\"↺\":\"⇢\",cls=e.type===\"destabilizing\"?\"\":e.type===\"stabilizing\"?\"stab\":\"unc\";\n          return `<li data-jump=\"${t.id}\"><span class=\"arrow ${cls}\">${a}<\u002Fspan><span class=\"target\">${t.name}<br><span style=\"color:var(--ink-soft);font-size:9px;font-family:Georgia,serif;font-style:italic;\">${e.note}<\u002Fspan><\u002Fspan><span class=\"type-tag\">${e.type}<\u002Fspan><\u002Fli>`;\n        }).join('')}\n    <\u002Ful>\n    <h3>Incoming · ${es.filter(e=>e.to===n.id).length}<\u002Fh3>\n    <ul class=\"casc-list\" style=\"margin-bottom:0;\">\n      ${es.filter(e=>e.to===n.id).length===0?`<li style=\"color:var(--ink-soft);grid-template-columns:1fr;\">None.<\u002Fli>`:\n        es.filter(e=>e.to===n.id).map(e=>{const s=node(e.from),a=e.type===\"destabilizing\"?\"←\":e.type===\"stabilizing\"?\"↺\":\"⇠\",cls=e.type===\"destabilizing\"?\"\":e.type===\"stabilizing\"?\"stab\":\"unc\";\n          return `<li data-jump=\"${s.id}\"><span class=\"arrow ${cls}\">${a}<\u002Fspan><span class=\"target\">${s.name}<br><span style=\"color:var(--ink-soft);font-size:9px;font-family:Georgia,serif;font-style:italic;\">${e.note}<\u002Fspan><\u002Fspan><span class=\"type-tag\">${e.type}<\u002Fspan><\u002Fli>`;\n        }).join('')}\n    <\u002Ful>`;\n  $('#closeSel').addEventListener('click', ()=>{ state.selected=null; applyState(); renderSide(); });\n  $$('#side li[data-jump]').forEach(li=>li.addEventListener('click', ()=>{ state.selected=li.dataset.jump; applyState(); renderSide(); }));\n}\n\n/* ---------- ZOOM & PAN ---------- */\nfunction applyTransform() {\n  const vp = $('#viewport');\n  vp.setAttribute('transform', `translate(${state.panX} ${state.panY}) scale(${state.zoom})`);\n  $('#zoomLevel').textContent = Math.round(state.zoom * 100) + '%';\n}\nfunction zoomBy(factor, cx, cy) {\n  // Zoom around point (cx,cy) in SVG coords. Clamped: 1.0 min (no zoom-out), 4.0 max.\n  const newZoom = Math.max(1.0, Math.min(4.0, state.zoom * factor));\n  if (newZoom === state.zoom) return;\n  if (cx == null) { cx = 870; cy = 435; }\n  const wx = (cx - state.panX) / state.zoom;\n  const wy = (cy - state.panY) / state.zoom;\n  state.zoom = newZoom;\n  state.panX = cx - wx * newZoom;\n  state.panY = cy - wy * newZoom;\n  // Clamp pan so the map can't drift off-canvas when zoomed\n  clampPan();\n  applyTransform();\n}\nfunction clampPan() {\n  // World is 1740x871. Viewport shows that area. At zoom z, world renders at size 1740*z.\n  // Allowed pan keeps world covering viewport: panX in [1740*(1-z), 0], same for Y.\n  const maxX = 0, minX = 1740 * (1 - state.zoom);\n  const maxY = 0, minY = 871 * (1 - state.zoom);\n  state.panX = Math.min(maxX, Math.max(minX, state.panX));\n  state.panY = Math.min(maxY, Math.max(minY, state.panY));\n}\nfunction resetZoom() { state.zoom = 1; state.panX = 0; state.panY = 0; applyTransform(); }\n\n/* ---------- DRAG-TO-REPOSITION NODES ---------- */\nlet editMode = false;\nlet nodeDrag = null; // { id, offsetX, offsetY }\n\nfunction setEditMode(on) {\n  editMode = on;\n  $('#pickPanel').style.display = on ? 'block' : 'none';\n  $('#pickMode').style.background = on ? 'var(--hot)' : 'transparent';\n  $('#pickMode').style.color = on ? '#fff' : 'var(--ink)';\n  $('#mapShell').classList.toggle('edit-mode', on);\n  if (on) renderPickPanel();\n}\n\nfunction startNodeDrag(e, id) {\n  if (!editMode) return;\n  e.stopPropagation();\n  e.preventDefault();\n  const n = node(id);\n  const p = svgPoint(e.clientX, e.clientY);\n  const wx = (p.x - state.panX) / state.zoom;\n  const wy = (p.y - state.panY) / state.zoom;\n  nodeDrag = { id, offsetX: wx - n.x, offsetY: wy - n.y };\n}\nwindow.addEventListener('mousemove', (e) => {\n  if (!nodeDrag) return;\n  const p = svgPoint(e.clientX, e.clientY);\n  const wx = (p.x - state.panX) / state.zoom;\n  const wy = (p.y - state.panY) / state.zoom;\n  const n = node(nodeDrag.id);\n  n.x = Math.round(wx - nodeDrag.offsetX);\n  n.y = Math.round(wy - nodeDrag.offsetY);\n  // Live update: just reposition this node's group and redraw edges\n  renderEdges();\n  const g = document.querySelector(`.node-g[data-id=\"${n.id}\"]`);\n  if (g) updateNodeGroupPosition(g, n);\n  applyState();\n  renderPickPanel();\n});\nwindow.addEventListener('mouseup', () => { nodeDrag = null; });\n\nfunction updateNodeGroupPosition(g, n) {\n  const iconW = 160, iconH = 160 * (80/120);\n  const scale = iconW / 120;\n  const tx = `translate(${n.x - iconW/2}, ${n.y - iconH/2}) scale(${scale})`;\n  g.querySelector('.activation-disc').setAttribute('cx', n.x);\n  g.querySelector('.activation-disc').setAttribute('cy', n.y);\n  g.querySelector('.icon-base').setAttribute('transform', tx);\n  g.querySelector('.icon-effect').setAttribute('transform', tx);\n  const labels = g.querySelectorAll('text');\n  if (labels[0]) { labels[0].setAttribute('x', n.x); labels[0].setAttribute('y', n.y + iconH/2 + 22); }\n  if (labels[1]) { labels[1].setAttribute('x', n.x); labels[1].setAttribute('y', n.y + iconH/2 + 42); }\n}\n\nfunction svgPoint(clientX, clientY) {\n  const svg = $('#mapSvg');\n  const pt = svg.createSVGPoint();\n  pt.x = clientX; pt.y = clientY;\n  return pt.matrixTransform(svg.getScreenCTM().inverse());\n}\n\n/* Edit mode — drag any node to reposition it */\nfunction renderPickPanel() {\n  const list = $('#pickNodeList');\n  if (!list) return;\n  list.innerHTML = NODES.map(n => {\n    const placed = n.x !== 0 || n.y !== 0;\n    return `<span style=\"background:${placed?'#3a2a24':'transparent'};color:${placed?'#d4c3aa':'#c6b8a4'};border:1px solid #3a2a24;padding:3px 7px;font-size:9.5px;border-radius:2px;\">${placed?'✓ ':''}${n.short}: ${n.x}, ${n.y}<\u002Fspan>`;\n  }).join(' ');\n  $('#pickAll').textContent = NODES.map(n => `${n.id}: ${n.x}, ${n.y}`).join('\\n');\n}\n$('#pickMode').addEventListener('click', () => setEditMode(!editMode));\n$('#pickCopy').addEventListener('click', () => {\n  const text = NODES.map(n => `${n.id}: ${n.x}, ${n.y}`).join('\\n');\n  try { navigator.clipboard.writeText(text); $('#pickCopy').textContent = 'Copied!'; setTimeout(()=>$('#pickCopy').textContent='Copy all', 1500); } catch(_){}\n});\n$('#pickExit').addEventListener('click', () => setEditMode(false));\n\n// Cache loaded icons so redraw is fast\nlet __iconCache = null;\nasync function redrawNodes() {\n  if (!__iconCache) return renderNodes();\n  const iconW = 160, iconH = 160 * (80/120);\n  const scale = iconW / 120;\n  $('#nodes').innerHTML = NODES.map(n => {\n    const { base, eff } = __iconCache[n.id];\n    const discR = 95;\n    const baseTx = `translate(${n.x - iconW/2}, ${n.y - iconH/2}) scale(${scale})`;\n    return `\n      <g class=\"node-g\" data-id=\"${n.id}\" data-tier=\"${n.tier}\">\n        <circle class=\"activation-disc\" cx=\"${n.x}\" cy=\"${n.y}\" r=\"${discR}\" />\n        <g class=\"node-icon icon-base\" transform=\"${baseTx}\">${base?.inner || ''}<\u002Fg>\n        <g class=\"node-icon icon-effect\" transform=\"${baseTx}\" style=\"display:none;\">${eff?.inner || ''}<\u002Fg>\n        <text class=\"node-label\" x=\"${n.x}\" y=\"${n.y + iconH/2 + 22}\">${n.short}<\u002Ftext>\n        <text class=\"node-temp\" x=\"${n.x}\" y=\"${n.y + iconH/2 + 42}\">+${n.threshold.toFixed(1)}°<\u002Ftext>\n      <\u002Fg>`;\n  }).join('');\n  $$('.node-g').forEach(el => {\n    el.addEventListener('click', (ev) => {\n      if (pickMode) return;\n      ev.stopPropagation();\n      state.selected = state.selected === el.dataset.id ? null : el.dataset.id;\n      applyState(); renderSide();\n    });\n  });\n}\n\n$('#zoomIn').addEventListener('click', () => zoomBy(1.3));\n$('#zoomReset').addEventListener('click', resetZoom);\n\n// Wheel zoom — only when zoomed in (so the page scrolls normally at 100%)\n$('#mapShell').addEventListener('wheel', (e) => {\n  if (state.zoom <= 1.0 && e.deltaY > 0) return; // allow page scroll when at min zoom + scrolling down\n  e.preventDefault();\n  const p = svgPoint(e.clientX, e.clientY);\n  zoomBy(e.deltaY < 0 ? 1.15 : 1/1.15, p.x, p.y);\n}, { passive: false });\n\n// Drag pan — only when zoomed in past 100%\nlet dragging = false, dragStart = null;\n$('#mapShell').addEventListener('mousedown', (e) => {\n  if (e.target.closest('.node-g') || e.target.closest('.zoom-ctrl')) return;\n  if (state.zoom <= 1.0) return; // no pan at base zoom\n  dragging = true;\n  dragStart = { x: e.clientX, y: e.clientY, panX: state.panX, panY: state.panY };\n  $('#mapShell').classList.add('dragging');\n});\nwindow.addEventListener('mousemove', (e) => {\n  if (!dragging) return;\n  const svg = $('#mapSvg');\n  const rect = svg.getBoundingClientRect();\n  const scale = 1740 / rect.width; // SVG units per client px\n  state.panX = dragStart.panX + (e.clientX - dragStart.x) * scale;\n  state.panY = dragStart.panY + (e.clientY - dragStart.y) * scale;\n  clampPan();\n  applyTransform();\n});\nwindow.addEventListener('mouseup', () => { dragging = false; $('#mapShell').classList.remove('dragging'); });\n\n/* ---------- WIRE CONTROLS ---------- */\n$('#tempSlider').addEventListener('input', (e)=>{ state.temp = parseFloat(e.target.value); applyState(); if (!state.selected) renderSide(); });\n$$('#regionFilter button').forEach(b=>b.addEventListener('click', ()=>{ $$('#regionFilter button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); state.region = b.dataset.region; applyState(); renderSide(); }));\n$('#mapSvg').addEventListener('click', (e)=>{\n  if (e.target.closest('.node-g')) return;\n  // Only deselect on clean click (not at end of drag)\n  if (dragStart && (Math.abs(e.clientX - dragStart.x) > 3 || Math.abs(e.clientY - dragStart.y) > 3)) return;\n  if (state.selected) { state.selected=null; applyState(); renderSide(); }\n});\n\n/* ---------- INIT ---------- */\n(async function(){\n  await loadMap();\n  renderEdges();\n  await renderNodes();\n  applyState();\n  renderSide();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
